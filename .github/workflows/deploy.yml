name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  # Manual trigger — force the full map reset even if provinces.json didn't change.
  workflow_dispatch:
    inputs:
      full_reset:
        description: "Force full map reset (import provinces + wipe game data + reseed + reset users)"
        type: boolean
        default: false

# Never let two deploys run at once — the reset path is destructive.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Build all three images on the runner and push to GHCR ────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_api: ${{ steps.meta.outputs.image_api }}
      image_web: ${{ steps.meta.outputs.image_web }}
      image_admin: ${{ steps.meta.outputs.image_admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image refs (GHCR requires lowercase)
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ github.sha }}"
          echo "image_api=ghcr.io/${REPO}-api:${TAG}"     >> "$GITHUB_OUTPUT"
          echo "image_web=ghcr.io/${REPO}-web:${TAG}"     >> "$GITHUB_OUTPUT"
          echo "image_admin=ghcr.io/${REPO}-admin:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.image_api }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web-map/Dockerfile
          build-args: VITE_API_BASE_URL=/api
          push: true
          tags: ${{ steps.meta.outputs.image_web }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build & push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: admin-panel/Dockerfile
          build-args: VITE_API_BASE_URL=/api
          push: true
          tags: ${{ steps.meta.outputs.image_admin }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max

  # ── 2. Pull the freshly-built images on EC2 and run them ────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # paths-filter needs the previous commit to diff

      - name: Detect provinces.json change
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            provinces:
              - 'api/data/provinces.json'

      - name: Decide whether to run the full map reset
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_reset }}" = "true" ]; then
            echo "reset=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.provinces }}" = "true" ]; then
            echo "reset=true" >> "$GITHUB_OUTPUT"
          else
            echo "reset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          # GitHub interpolates these ${{ }} values before sending the script.
          script: |
            set -e
            export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
            export IMAGE_API="${{ needs.build.outputs.image_api }}"
            export IMAGE_WEB="${{ needs.build.outputs.image_web }}"
            export IMAGE_ADMIN="${{ needs.build.outputs.image_admin }}"
            RESET="${{ steps.decide.outputs.reset }}"

            cd "${{ secrets.EC2_APP_DIR }}"

            echo "==> Syncing compose files"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "==> Pulling images (no build on this box)"
            docker compose pull

            echo "==> Starting containers"
            docker compose up -d --wait

            echo "==> Running database migrations"
            docker compose exec -T api npm run migration:run:prod

            if [ "$RESET" = "true" ]; then
              echo "==> provinces.json changed (or forced): FULL MAP RESET"
              docker compose exec -T api npm run import:provinces:prod
              docker compose exec -T api npm run reset:game:prod
              docker compose exec -T api npm run seed:buildings:prod
              docker compose exec -T api npm run seed:techs:prod
              docker compose exec -T api npm run seed:troop-types:prod
            else
              echo "==> provinces.json unchanged: migrations + container update only"
            fi

            echo "==> Cleanup"
            docker logout ghcr.io
            docker image prune -f
            echo "==> Deploy complete"
